<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ícono — Salva Patitas</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #2a2a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    font-family: system-ui, sans-serif;
  }

  .wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  .hint {
    color: #999;
    font-size: 0.85rem;
    max-width: 500px;
    text-align: center;
  }

  #icon {
    width: 512px;
    height: 512px;
    position: relative;
    overflow: hidden;
    background: #1F8A62;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }

  #paw {
    display: block;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
</style>
</head>
<body>

<div class="wrapper">
  <div id="icon">
    <canvas id="paw" width="300" height="300"></canvas>
  </div>
  <p class="hint">512 × 512 px — clic derecho → Inspeccionar → clic derecho en el div#icon → "Capture node screenshot", guardalo como icon.png</p>
</div>

<script>
  const canvas = document.getElementById('paw');
  const ctx = canvas.getContext('2d');
  const scale = 300 / 48; // escala el dibujo original de 48x48

  ctx.scale(scale, scale);
  ctx.fillStyle = '#ffffff';

  // Almohadilla central
  ctx.beginPath();
  ctx.ellipse(24, 30, 10, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // 4 deditos
  const toes = [
    { x: 12, y: 18, rx: 5, ry: 4, angle: -0.4 },
    { x: 20, y: 13, rx: 4.5, ry: 4, angle: -0.1 },
    { x: 28, y: 13, rx: 4.5, ry: 4, angle: 0.1 },
    { x: 36, y: 18, rx: 5, ry: 4, angle: 0.4 },
  ];

  toes.forEach(({ x, y, rx, ry, angle }) => {
    ctx.beginPath();
    ctx.ellipse(x, y, rx, ry, angle, 0, Math.PI * 2);
    ctx.fill();
  });
</script>

</body>
</html>
