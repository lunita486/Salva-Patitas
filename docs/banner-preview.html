<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Banner — Salva Patitas</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #2a2a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    font-family: system-ui, sans-serif;
  }

  .wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  .hint {
    color: #999;
    font-size: 0.8rem;
  }

  #banner {
    width: 1024px;
    height: 500px;
    position: relative;
    overflow: hidden;
    background: #DFFBEC;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }

  /* Burbujas decorativas, mismo verde menta que usa LeafOverlay en el app */
  .bubble {
    position: absolute;
    border-radius: 50%;
    background: rgba(31,138,98,0.16);
  }

  .b1 { width: 260px; height: 260px; top: -100px; left: -60px; }
  .b2 { width: 180px; height: 180px; top: 320px; left: 40px; background: rgba(31,138,98,0.12); }
  .b3 { width: 340px; height: 340px; top: -150px; right: -110px; }
  .b4 { width: 200px; height: 200px; bottom: -110px; right: 100px; background: rgba(31,138,98,0.12); }
  .b5 { width: 110px; height: 110px; bottom: 50px; right: 40px; background: rgba(31,138,98,0.2); }

  .content {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    align-items: center;
    padding: 0 70px;
    gap: 48px;
  }

  .paw-circle {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: #1F8A62;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 12px 30px rgba(31,138,98,0.35);
  }

  #paw {
    display: block;
  }

  .text {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .wordmark {
    font-size: 76px;
    font-weight: 800;
    color: #1A1A1A;
    letter-spacing: -0.02em;
    line-height: 1;
    white-space: nowrap;
  }

  .tagline {
    font-size: 26px;
    font-weight: 500;
    color: #1F8A62;
    letter-spacing: 0.01em;
  }
</style>
</head>
<body>

<div class="wrapper">
  <div id="banner">
    <div class="bubble b1"></div>
    <div class="bubble b2"></div>
    <div class="bubble b3"></div>
    <div class="bubble b4"></div>
    <div class="bubble b5"></div>

    <div class="content">
      <div class="paw-circle">
        <canvas id="paw" width="130" height="130"></canvas>
      </div>
      <div class="text">
        <div class="wordmark">Salva Patitas</div>
        <div class="tagline">Cada patita merece un hogar 🐾</div>
      </div>
    </div>
  </div>
  <p class="hint">1024 × 500 px — clic derecho → Inspeccionar → clic derecho en el div#banner → "Capture node screenshot"</p>
</div>

<script>
  const canvas = document.getElementById('paw');
  const ctx = canvas.getContext('2d');
  const scale = 130 / 48; // escala el dibujo original de 48x48

  ctx.scale(scale, scale);
  ctx.fillStyle = '#ffffff';

  // Almohadilla central
  ctx.beginPath();
  ctx.ellipse(24, 30, 10, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // 4 deditos
  const toes = [
    { x: 12, y: 18, rx: 5, ry: 4, angle: -0.4 },
    { x: 20, y: 13, rx: 4.5, ry: 4, angle: -0.1 },
    { x: 28, y: 13, rx: 4.5, ry: 4, angle: 0.1 },
    { x: 36, y: 18, rx: 5, ry: 4, angle: 0.4 },
  ];

  toes.forEach(({ x, y, rx, ry, angle }) => {
    ctx.beginPath();
    ctx.ellipse(x, y, rx, ry, angle, 0, Math.PI * 2);
    ctx.fill();
  });
</script>

</body>
</html>
